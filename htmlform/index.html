<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=h, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Record</h1>

    <form action="" autocomplete="on" novalidate >

        <fieldset style="width: 23%;">

            <legend style="border:1px solid; border-radius: 50%; padding: 12px 4px; text-align: center;">Form</legend>

        <label for="name" >Your Name:</label>
        <input type="name" placeholder="Enter your name" id="name" name="name1"><br><br>

        <label for="password" >Your Password:</label>
        <input type="password" placeholder="Enter your password" id="password" name="name2"><br><br>

        <span>Enter Your Gender:</span>

        <input type="radio" id="male" name="gen">
        <label for="male">Male</label>

        <input type="radio"id="female" name="gen">
        <label for="female">Female</label>

        <input type="radio"id="others" name="gen">
        <label for="others">Others</label> <br> <br>
        
        <p>Choose Languages </p>

        <input type="checkbox" name="css" id="css">
        <label for="css">CSS</label> <br>

        <input type="checkbox" name="javascript" id="javascript">
        <label for="javascript">JAVASCRIPT</label> <br>

        <input type="checkbox" name="react" id="react">
        <label for="react">REACT</label> <br>

        <input type="checkbox" name="python" id="python">
        <label for="python">PYTHON</label> <br> <br>

        <label for="lang">Select your fav. lang:</label>
        <select name="Languages" id="lang">
            <option value="" disabled selected>Select your  lang.</option>
            <option value="HTML">HTML</option>
            <option value="CSS">CSS</option>
            <option value="JS">JS</option>
            <option value="REACT">REACT</option>
            <option value="PYTHON">PYTHON</option>
        </select><br><br>

        <textarea name="ytDesc" id="" rows="2" cols="32" placeholder="Enter your suggestions"></textarea> <br> <br>
                                                  <!-- form -type  extra attributes -->
        <label for="">Choose your birth date</label>
        <input type="date" name="" id="" min="2000-01-01" max="2010-12-31"> <br> <br>

        <label for="col">Choose your color:</label>
        <input type="color" id="col" name="usercolor"> <br> <br>

        <label for=""> Choose your Date&time:</label>
        <input type="datetime-local" name="" id=""> <br> <br>

        <input type="email" placeholder="Enter your email"> <br> <br>
        <input type="tel" placeholder="Enter your phone number"> <br> <br>
        <input type="number" placeholder="number" min="0" max="5"> <br> <br>
        <label for="">Brightness level: (0-100):</label>
        <input type="range" min="0" max="100"> <br> <br>

        <!-- <input type="button" value="SUMBIT" name="sumbit" id=""> -->
         <input type="submit">
        <input type="reset">

        </fieldset><br>

        <fieldset>
            <legend>06/03/2026</legend>

                <input list="colors" placeholder="Choose your fav. color">
                <datalist id="colors">
                    <option value="red"></option>
                    <option value="green"></option>
                    <option value="blue"></option>
                </datalist>
        </fieldset>

     </form>
    
</body>
</html>
